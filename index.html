<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">

  <!-- PWA -->
  /manifest.json

  <!-- Icons -->
  <link rel="icon" href="/icons/iconpple-touch-icon" href="/icons/icon rel="stylesheet" href="/css/dashboard>
  <link rel="stylesheet" href="ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0</head>

<body>

<section class="page page-home active">
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="panel panel-time">
    <div id="clock"></div>
    <div id="date"></div>
  </div>

  <div class="panel panel-weather">
    <div id="weather-location"></div>
    <i id="weather-icon" class="wi"></i>
    <div class="temp"><span id="weather-temp"></span>°</div>
    <div id="weather-desc"></div>
  </div>

  <div class="panel panel-calendar">
    <ul id="calendar-list"></ul>
  </div>

  <div class="panel panel-news">
    <ul id="news-list"></ul>
  </div>

  <div class="panel panel-functions">
    <div class="icon"><i class="fa fa-home"></i></div>
  </div>
</section>

<script src="/js/app.jsript src="/js/weather.js"></script>
<script src="/js/news.js"></script>
<script src="/js/calendar.js"></script>
<script src="/js/theme.js"></script>
<script src="/sw-register.js"></script>

</body>
</html>
